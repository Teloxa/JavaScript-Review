<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JavaScript Review - Vista Web</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe8;
      --panel: #fffaf3;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #1d4ed8;
      --border: #e5ddd3;
      --shadow: 0 18px 50px rgba(31, 41, 55, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, 'Times New Roman', serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(29, 78, 216, 0.08), transparent 30%),
        linear-gradient(180deg, #fffdf9 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 48px 20px 56px;
    }

    .hero {
      background: rgba(255, 250, 243, 0.86);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .eyebrow {
      margin: 0 0 10px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.78rem;
      color: var(--accent);
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1.05;
    }

    .subtitle {
      max-width: 62ch;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
      margin-top: 22px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 1.15rem;
    }

    .card p {
      margin: 8px 0;
      line-height: 1.6;
      word-break: break-word;
    }

    .card strong {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="page">
    <div id="app"></div>
  </main>
  <script src="01_Problems.js"></script>
</body>
</html>
